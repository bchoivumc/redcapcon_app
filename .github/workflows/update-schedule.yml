name: Update Schedule

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies and Chrome
        run: |
          cd scripts
          npm install
          npx puppeteer browsers install chrome

      - name: Scrape schedule
        run: |
          cd scripts
          set +e
          node scrape_to_json.js > ../docs/schedule_2026_api.json 2>../scrape.log
          EXIT_CODE=$?
          set -e
          echo "=== Scraper log ==="
          cat ../scrape.log
          echo "=== Exit code: $EXIT_CODE ==="
          exit $EXIT_CODE

      - name: Validate scrape results
        run: |
          SESSION_COUNT=$(node -e "const d=JSON.parse(require('fs').readFileSync('docs/schedule_2026_api.json','utf8')); console.log(d.sessions?.length ?? 0)")
          echo "Scraped $SESSION_COUNT sessions"
          if [ "$SESSION_COUNT" -lt 20 ]; then
            echo "ERROR: Only $SESSION_COUNT sessions scraped — aborting to preserve existing data"
            exit 1
          fi

          # Sanity-check: Day 1 morning sessions (Sep 1) must start before 10:00 CDT
          # (CDT-as-UTC convention: CDT hour == UTC hour in the stored ISO string).
          # If the survey returns times shifted vs CDT (known to occur), this aborts.
          BREAKFAST_HOUR=$(node -e "
            const d = JSON.parse(require('fs').readFileSync('docs/schedule_2026_api.json','utf8'));
            const b = d.sessions.find(s => s.title === 'Breakfast' && s.startTime.startsWith('2026-09-01'));
            if (!b) { console.log(99); process.exit(0); }
            console.log(parseInt(b.startTime.substring(11,13)));
          ")
          echo "Day 1 Breakfast UTC hour (CDT hour): $BREAKFAST_HOUR"
          if [ "$BREAKFAST_HOUR" -ge 10 ]; then
            echo "ERROR: Day 1 Breakfast starts at hour $BREAKFAST_HOUR CDT — times appear shifted. Aborting to preserve existing data."
            exit 1
          fi

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet docs/schedule_2026_api.json || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push if changed
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/schedule_2026_api.json
          git commit -m "Auto-update schedule data [skip ci]"
          git pull --rebase origin main
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: No changes detected
        if: steps.changes.outputs.changed != 'true'
        run: echo "No schedule changes detected"
