name: Update Schedule

on:
  # Runs daily at 2 AM UTC (adjust timezone as needed)
  schedule:
    - cron: '0 2 * * *'

  # Allows manual trigger from GitHub Actions tab
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          cd scripts
          npm install

      - name: Install Chromium for Puppeteer
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser

      - name: Scrape schedule
        run: |
          cd scripts
          node scrape_to_json.js > ../docs/schedule_2026_api.json
        env:
          PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium-browser

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet docs/schedule_2026_api.json || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push if changed
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/schedule_2026_api.json
          git commit -m "Auto-update schedule data [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: No changes detected
        if: steps.changes.outputs.changed != 'true'
        run: echo "No schedule changes detected"
