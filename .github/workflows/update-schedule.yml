name: Update Schedule

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies and Chrome
        run: |
          cd scripts
          npm install
          npx puppeteer browsers install chrome

      - name: Scrape schedule
        run: |
          cd scripts
          set +e
          node scrape_to_json.js > ../docs/schedule_2026_api.json 2>../scrape.log
          EXIT_CODE=$?
          set -e
          echo "=== Scraper log ==="
          cat ../scrape.log
          echo "=== Exit code: $EXIT_CODE ==="
          exit $EXIT_CODE

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet docs/schedule_2026_api.json || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push if changed
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/schedule_2026_api.json
          git commit -m "Auto-update schedule data [skip ci]"
          git pull --rebase
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: No changes detected
        if: steps.changes.outputs.changed != 'true'
        run: echo "No schedule changes detected"
